{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUME Skin</title>
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="app-body">
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">L</div>
            <h2>LUME Skin</h2>
        </div>
        <nav class="menu">
            <a href="{% url 'dashboard' %}" class="menu-item active">🏠 Dashboard (Home)</a>
            <a href="#" class="menu-item">📷 Scanner de Pele por IA</a>
           
            <a href="#" class="menu-item">✨ Recomendações</a>
            <a href="#" class="menu-item">👩‍⚕️ Especialistas</a>
        </nav>
        <div class="sidebar-footer">
           
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="user-profile">
                <span class="bell-icon">🔔</span>
                <img src="https://i.pravatar.cc/150?img=5" alt="Usuário" class="avatar">
            </div>
        </header>
        
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
